version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: journeytogether-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_PATH=/app/data.db
      - UPLOAD_DIR=/app/uploads
      - JWT_SECRET=${JWT_SECRET:-journeytogether_jwt_secret_2026}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    volumes:
      - journeytogether_data:/app/data.db
      - journeytogether_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # E2E test service — runs Playwright against the frontend
  # Usage: docker compose run --rm e2e
  e2e:
    image: mcr.microsoft.com/playwright:v1.49.0-noble
    container_name: journeytogether-e2e
    working_dir: /workspace/frontend
    volumes:
      - .:/workspace
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    ipc: host
    environment:
      - CI=true
      - API_BASE_URL=http://backend:4000
      - WEB_URL=http://frontend-web:8085
    depends_on:
      - backend
    profiles:
      - e2e
    command: >
      sh -c "cd /workspace/frontend && npm install && npx playwright install-deps chromium && npm run test:e2e"

  # Expo web server for E2E tests (used with docker compose --profile e2e up)
  frontend-web:
    image: mcr.microsoft.com/playwright:v1.49.0-noble
    container_name: journeytogether-frontend-web
    working_dir: /workspace/frontend
    volumes:
      - .:/workspace
    ports:
      - "8085:8085"
    environment:
      - NODE_ENV=test
    profiles:
      - e2e
    command: >
      sh -c "cd /workspace/frontend && npm install && npx expo start --web --no-dev --port 8085"

volumes:
  journeytogether_data:
  journeytogether_uploads:
