version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: journeytogether-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_PATH=/app/data.db
      - UPLOAD_DIR=/app/uploads
      - JWT_SECRET=${JWT_SECRET:-journeytogether_jwt_secret_2026}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    volumes:
      - journeytogether_data:/app/data.db
      - journeytogether_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  journeytogether_data:
  journeytogether_uploads:
